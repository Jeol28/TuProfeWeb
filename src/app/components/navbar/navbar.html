<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/" class="navbar-brand" (click)="closeMenu()">
      <img src="assets/logoletra.png" alt="TuProfe" class="navbar-logo">
    </a>

    <!-- Desktop links -->
    <ul class="navbar-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a></li>
      <li><a routerLink="/privacy-policy" routerLinkActive="active">Privacidad</a></li>
      <li><a routerLink="/terms" routerLinkActive="active">Términos</a></li>
      <li>
        <a routerLink="/delete-account" class="btn-tp" style="font-size: 0.95rem; padding: 0.5rem 1.25rem;">
          Borrar cuenta
        </a>
      </li>
    </ul>

    <!-- Hamburger button -->
    <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <div class="mobile-menu">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Inicio</a>
      <a routerLink="/privacy-policy" routerLinkActive="active" (click)="closeMenu()">Privacidad</a>
      <a routerLink="/terms" routerLinkActive="active" (click)="closeMenu()">Términos</a>
      <a routerLink="/delete-account" routerLinkActive="active" (click)="closeMenu()">Borrar cuenta</a>
    </div>
  }
</nav>
